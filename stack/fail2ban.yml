services:
  fail2ban:
    image: crazymax/fail2ban:latest
    container_name: fail2ban
    network_mode: "host"
    cap_add:
      - NET_ADMIN
      - NET_RAW
    restart: unless-stopped
    volumes:
      - /portainer/Config/fail2ban/data:/data
      - /var/log/auth.log:/var/log/auth.log:ro
      - /portainer/Config/nginx-proxy-manager/data/logs/:/log/npm/:ro
    environment:
      - TZ=${TZ}
      - F2B_LOG_TARGET=STDOUT
      - F2B_LOG_LEVEL=INFO
      - F2B_DB_PURGE_AGE=${DB_PURGE_AGE}
      - F2B_DEST_EMAIL=${DEST_EMAIL}
      - F2B_SENDER=${SENDER}
      - F2B_ACTION=%(action_mwl)s
      - SSMTP_HOST=${SMTP_HOST}
      - SSMTP_PORT=${SMTP_PORT}
      - SSMTP_HOSTNAME=${SMTP_HOSTNAME}
      - SSMTP_USER=${SMTP_USER}
      - SSMTP_PASSWORD=${SMTP_PASSWORD}
      - SSMTP_TLS=${TLS}
      
