services:
  wg-easy:
    environment:
      # Change this to your host's public address
      - HOST=${WG_HOST}
      - DISABLE_IPV6=true
      - PORT=${WG_PORT}
      - INSECURE=false

    image: ghcr.io/wg-easy/wg-easy:15
    container_name: wg-easy
    networks:
      wg:
        ipv4_address: ${WG_IP}
    volumes:
      - /portainer/Config/wireguard:/etc/wireguard
      - /lib/modules:/lib/modules:ro 
    ports:
      - "${WG_PORT}:51820/udp"
      - "51821:51821/tcp"
    restart: unless-stopped
    cap_add:
      - NET_ADMIN
      - SYS_MODULE
    sysctls:
      - net.ipv4.ip_forward=1
      - net.ipv4.conf.all.src_valid_mark=1
      - net.ipv6.conf.all.disable_ipv6=1
      - net.ipv6.conf.all.forwarding=0
      - net.ipv6.conf.default.forwarding=0

networks:
  wg:
    driver: bridge
    enable_ipv6: false
    ipam:
      driver: default
      config:
        - subnet: ${WG_SUBNET}
        
        
